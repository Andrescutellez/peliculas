<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming en linea</title>

  <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container d-flex justify-content-between align-items-center py-3">
      <a class="brand text-decoration-none" href="index.html">
        <span class="brand-mark">SE</span>
        <span class="brand-copy">
          <strong>Streaming en linea</strong>
        </span>
      </a>
    </div>
  </header>

  <main class="page-shell">

    <section class="container mt-4">
      <div class="filters-panel">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-lg-4">
            <label class="form-label" for="searchInput">Buscar</label>
            <input id="searchInput" class="form-control" type="search" placeholder="Titulo, actor, director o palabra clave">
          </div>
          <div class="col-6 col-lg-2">
            <label class="form-label" for="typeFilter">Formato</label>
            <select id="typeFilter" class="form-select">
              <option value="all">Todo</option>
            </select>
          </div>
          <div class="col-6 col-lg-2">
            <label class="form-label" for="genreFilter">Genero</label>
            <select id="genreFilter" class="form-select">
              <option value="all">Todos</option>
            </select>
          </div>
          <div class="col-6 col-lg-2">
            <label class="form-label" for="yearFilter">Ano</label>
            <select id="yearFilter" class="form-select">
              <option value="all">Todos</option>
            </select>
          </div>
          <div class="col-6 col-lg-2">
            <label class="form-label" for="sortFilter">Ordenar por</label>
            <select id="sortFilter" class="form-select">
              <option value="latest">Mas recientes</option>
              <option value="oldest">Mas antiguas</option>
              <option value="title">Titulo A-Z</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="container mt-4 pb-5">
      <div class="results-head">
        <div>
          <p class="eyebrow mb-2">Listado principal</p>
          <h2 class="section-title">Ultimas peliculas organizadas por fecha</h2>
        </div>
        <p id="resultsSummary" class="results-summary mb-0"></p>
      </div>

      <div id="moviesContainer" class="row g-4 mt-1"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
  <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
